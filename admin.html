<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>2 Bam Birds — Sub &amp; Subscriber List (Admin)</title>
<style>
  :root{
    --navy:#023D56;
    --teal:#02696B;
    --teal-bright:#03B3B6;
    --purple:#461B5C;
    --cream:#FBF8F3;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:'Montserrat',Arial,sans-serif; background:var(--cream);
    color:#243;
    padding:32px 20px 60px;
  }
  h1{color:var(--navy); font-size:1.5rem; margin-bottom:4px}
  .sub{color:#5a6870; font-size:.9rem; margin-bottom:24px}
  .card{
    max-width:1100px; margin:0 auto; background:#fff; border:1px solid #E7E2D6;
    border-radius:10px; padding:24px;
  }
  #gate{max-width:380px; margin:80px auto; text-align:center}
  #gate input{
    width:100%; padding:10px 12px; font-size:1rem; border:1px solid #ccc;
    border-radius:6px; margin:12px 0;
  }
  button{
    background:var(--navy); color:#fff; border:none; border-radius:6px;
    padding:10px 18px; font-size:.95rem; font-weight:700; cursor:pointer;
  }
  button:hover{opacity:.9}
  button.secondary{background:var(--teal-bright)}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px}
  .stats{font-size:.85rem; color:#5a6870}
  table{width:100%; border-collapse:collapse; font-size:.85rem}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid #eee; white-space:nowrap}
  th{background:#f5f2ea; color:var(--navy); position:sticky; top:0}
  tr:hover td{background:#fafafa}
  .yes{color:var(--teal); font-weight:700}
  .no{color:#b8a; opacity:.5}
  .tablewrap{overflow-x:auto; max-height:70vh; overflow-y:auto; border:1px solid #eee; border-radius:6px}
  .err{color:#a33; margin-top:10px; font-size:.9rem}
  .loading{padding:40px; text-align:center; color:#888}
</style>
</head>
<body>

  <div id="gate">
    <h1>🦚 Admin Access</h1>
    <p class="sub">Enter the admin password to view the sub &amp; subscriber list.</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button onclick="unlock()" style="width:100%">Unlock</button>
    <div class="err" id="gateErr"></div>
  </div>

  <div class="card" id="dataCard" style="display:none">
    <div class="toolbar">
      <div>
        <h1 style="margin-bottom:2px">Sub &amp; Subscriber List</h1>
        <div class="stats" id="stats"></div>
      </div>
      <div>
        <button class="secondary" onclick="exportCsv()">⬇ Export CSV</button>
        <button onclick="loadData()">↻ Refresh</button>
      </div>
    </div>
    <div id="tableArea" class="loading">Loading…</div>
  </div>

<script>
const API = "/.netlify/functions/subs";
let currentRecords = [];

function unlock(){
  const pw = document.getElementById("pw").value;
  if(!pw){ showGateErr("Please enter a password."); return; }
  sessionStorage.setItem("subAdminPw", pw);
  loadData();
}
document.getElementById("pw").addEventListener("keydown", e=>{
  if(e.key === "Enter") unlock();
});

function showGateErr(msg){
  const el = document.getElementById("gateErr");
  el.textContent = msg;
}

async function loadData(){
  const pw = sessionStorage.getItem("subAdminPw");
  if(!pw){ return; }
  document.getElementById("tableArea").innerHTML = "Loading…";
  document.getElementById("tableArea").className = "loading";
  try{
    const res = await fetch(API, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ action:"list", data:{ password: pw } })
    });
    const json = await res.json();
    if(!json.ok){
      if(res.status === 401){
        sessionStorage.removeItem("subAdminPw");
        document.getElementById("gate").style.display = "block";
        document.getElementById("dataCard").style.display = "none";
        showGateErr("Incorrect password.");
        return;
      }
      throw new Error(json.error || "Something went wrong.");
    }
    document.getElementById("gate").style.display = "none";
    document.getElementById("dataCard").style.display = "block";
    currentRecords = json.records;
    renderTable(currentRecords);
  }catch(err){
    document.getElementById("tableArea").className = "";
    document.getElementById("tableArea").innerHTML =
      '<p class="err">'+ (err.message || "Failed to load data.") +'</p>';
  }
}

function renderTable(records){
  const subCount = records.filter(r=>r.permission).length;
  const eventCount = records.filter(r=>r.wantsEvents).length;
  document.getElementById("stats").textContent =
    `${records.length} total · ${subCount} on sub list · ${eventCount} subscribed to class/event info`;

  if(records.length === 0){
    document.getElementById("tableArea").className = "";
    document.getElementById("tableArea").innerHTML = "<p>No one has registered yet.</p>";
    return;
  }

  let rows = records.map(r => `
    <tr>
      <td>${escapeHtml(r.firstName)}</td>
      <td>${escapeHtml(r.lastName)}</td>
      <td>${escapeHtml(r.email)}</td>
      <td>${escapeHtml(r.cell || "—")}</td>
      <td class="${r.permission ? "yes" : "no"}">${r.permission ? "Yes" : "No"}</td>
      <td class="${r.wantsEvents ? "yes" : "no"}">${r.wantsEvents ? "Yes" : "No"}</td>
      <td>${formatDate(r.joinedAt)}</td>
    </tr>
  `).join("");

  document.getElementById("tableArea").className = "";
  document.getElementById("tableArea").innerHTML = `
    <div class="tablewrap">
      <table>
        <thead>
          <tr>
            <th>First Name</th><th>Last Name</th><th>Email</th><th>Cell</th>
            <th>Sub List</th><th>Class/Event Info</th><th>Joined</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function escapeHtml(s){
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
  }[c]));
}
function formatDate(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, {year:"numeric",month:"short",day:"numeric"});
}

function exportCsv(){
  if(!currentRecords.length){ return; }
  const headers = ["First Name","Last Name","Email","Cell","Sub List","Class/Event Info","Joined"];
  const rows = currentRecords.map(r => [
    r.firstName, r.lastName, r.email, r.cell || "",
    r.permission ? "Yes" : "No", r.wantsEvents ? "Yes" : "No",
    r.joinedAt ? new Date(r.joinedAt).toLocaleDateString() : ""
  ]);
  const csv = [headers, ...rows].map(row =>
    row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")
  ).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `2bambirds-sub-list-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Auto-unlock if we already have a password saved this session.
if(sessionStorage.getItem("subAdminPw")){
  loadData();
}
</script>
</body>
</html>
